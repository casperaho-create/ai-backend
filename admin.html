<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

<div id="loginBox">
  <h2>Företags‑login</h2>
  <input id="email" placeholder="Email" /><br><br>
  <input id="password" type="password" placeholder="Lösenord" /><br><br>
  <button onclick="login()">Logga in</button>
  <p id="error" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
  <h2 id="companyName"></h2>
  <h3>Senaste Leads</h3>
  <div id="leads"></div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://ai-backend-ltel.vercel.app/api/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!data.success) {
    document.getElementById("error").innerText = "Fel uppgifter";
    return;
  }

  sessionStorage.setItem("company_id", data.company_id);
  sessionStorage.setItem("company_name", data.name);

  loadDashboard();
}

async function loadDashboard() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("companyName").innerText =
    "Inloggad som: " + sessionStorage.getItem("company_name");

  const companyId = sessionStorage.getItem("company_id");

  const res = await fetch(
    `https://ai-backend-ltel.vercel.app/api/admin/leads?company_id=${companyId}`
  );

  const data = await res.json();

  const leadsDiv = document.getElementById("leads");
  leadsDiv.innerHTML = "";

  data.leads.forEach(lead => {
    const div = document.createElement("div");
    div.innerHTML = `
      <hr>
      <strong>${lead.email || "Ingen email"}</strong><br>
      ${lead.phone || "Ingen telefon"}<br>
      ${lead.message}
    `;
    leadsDiv.appendChild(div);
  });
}

if (sessionStorage.getItem("company_id")) {
  loadDashboard();
}
</script>

</body>
</html>
