<!DOCTYPE html>
<html>
<head>
  <title>AI Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: 60px auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      margin-bottom: 30px;
    }

    h1, h2 {
      margin-top: 0;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-family: Arial;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .logout {
      float: right;
      background: #ef4444;
    }

    .logout:hover {
      background: #dc2626;
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .statBox {
      flex: 1;
      min-width: 200px;
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .lead {
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .lead small {
      color: #94a3b8;
    }

    #dashboard {
      display: none;
    }

    .replyBox {
      margin-top: 10px;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>🔐 Företags‑login</h2>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Lösenord" />
    <button onclick="login()">Logga in</button>
    <p id="error" style="color:#f87171;"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="card">
      <h1 id="companyName"></h1>
      <button class="logout" onclick="logout()">Logga ut</button>
    </div>

    <div class="stats">
      <div class="statBox">
        <h2 id="totalLeads">0</h2>
        <p>Totala Leads</p>
      </div>
    </div>

    <div class="card">
      <h2>📥 Senaste Leads</h2>
      <div id="leads"></div>
    </div>

  </div>

</div>

<script>

const API_BASE = "https://ai-backend-ltel.vercel.app/api";

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API_BASE + "/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!data.success) {
    document.getElementById("error").innerText = "Fel uppgifter";
    return;
  }

  sessionStorage.setItem("company_name", data.name);
  loadDashboard();
}

async function loadDashboard() {

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("companyName").innerText =
    "🚀 " + sessionStorage.getItem("company_name");

  const res = await fetch(API_BASE + "/admin/leads", {
    credentials: "include"
  });

  const data = await res.json();

  const leadsDiv = document.getElementById("leads");
  leadsDiv.innerHTML = "";

  document.getElementById("totalLeads").innerText = data.leads.length;

  data.leads.forEach(lead => {

    const div = document.createElement("div");
    div.classList.add("lead");

    div.innerHTML = `
      <strong>${lead.email || "Ingen email"}</strong><br>
      ${lead.phone || "Ingen telefon"}<br><br>
      ${lead.message}<br>
      <small>${new Date(lead.created_at).toLocaleString()}</small>
      ${
        lead.email
          ? `
          <br><br>
          <button onclick="toggleReply('${lead.email}')">
            ✉️ Svara
          </button>
          <div class="replyBox" id="reply-${lead.email}" style="display:none;">
            <textarea id="msg-${lead.email}" rows="3"
              placeholder="Skriv ditt svar..."></textarea>
            <button onclick="sendReply('${lead.email}')">
              Skicka svar
            </button>
          </div>
          `
          : ""
      }
    `;

    leadsDiv.appendChild(div);
  });
}

function toggleReply(email) {
  const box = document.getElementById("reply-" + email);
  box.style.display = box.style.display === "none" ? "block" : "none";
}

async function sendReply(email) {

  const message = document.getElementById("msg-" + email).value;

  if (!message) {
    alert("Skriv ett meddelande");
    return;
  }

  const res = await fetch(API_BASE + "/admin/reply", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ to: email, message })
  });

  const data = await res.json();

  if (data.success) {
    alert("Svar skickat 🚀");
    document.getElementById("msg-" + email).value = "";
  } else {
    alert("Något gick fel");
  }
}

function logout() {
  sessionStorage.clear();
  location.reload();
}

if (sessionStorage.getItem("company_name")) {
  loadDashboard();
}

</script>

</body>
</html>
