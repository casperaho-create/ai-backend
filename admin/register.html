<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Skapa Företagskonto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #111827;
      padding: 40px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    h2 {
      margin-top: 0;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Skapa Företagskonto</h2>

    <input id="name" placeholder="Företagsnamn" />
    
    <select id="company_type">
      <option value="">Välj företagstyp</option>
      <option value="industri">Industri</option>
      <option value="bygg">Bygg</option>
      <option value="konsult">Konsult</option>
      <option value="ehandel">E‑handel</option>
      <option value="bilverkstad">Bilverkstad</option>
    </select>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Lösenord" />

    <button onclick="register()">Skapa konto</button>
  </div>

  <script>
    async function register() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const company_type = document.getElementById("company_type").value;

      if (!name || !email || !password || !company_type) {
        alert("Fyll i alla fält");
        return;
      }

      try {
        const res = await fetch("https://ai-backend-ltel.vercel.app/api/admin/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            email,
            password,
            company_type
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || "Något gick fel");
          return;
        }

        if (data.success) {
          // 🔐 Spara företagsdata temporärt
          localStorage.setItem("companyData", JSON.stringify(data.company));

          // 🚀 Skicka vidare till onboarding
          window.location.href = "/admin/onboarding.html";
        }

      } catch (error) {
        console.error("Register error:", error);
        alert("Serverfel. Kolla Vercel logs.");
      }
    }
  </script>

</body>
</html>
