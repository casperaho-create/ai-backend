<!DOCTYPE html>
<html>
<head>
  <title>Skapa konto</title>
</head>
<body>
  <h2>Skapa företagskonto</h2>

  <input id="name" placeholder="Företagsnamn"><br><br>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Lösenord"><br><br>

  <button onclick="register()">Skapa konto</button>

  <script>
    async function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/admin/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();

      if (data.success) {
        alert("Konto skapat! Din API-nyckel:\n\n" + data.company.api_key);
        window.location.href = "/admin.html";
      } else {
        alert(data.error);
      }
    }
  </script>
</body>
</html>
