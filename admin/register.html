<script>
let currentKey = "";

async function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const company_type = document.getElementById("company_type").value;

  const res = await fetch("/api/admin/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password, company_type })
  });

  const data = await res.json();

  if (data.success) {
    currentKey = data.company.api_key;

    // Visa API-nyckel
    document.getElementById("apiKey").innerText = currentKey;

    // 🔥 FIXAD INSTALLATIONSKOD (ingen script-krock)
    const installScript =
      '<script>window.AI_COMPANY_KEY = "' + currentKey + '";<\/script>\n' +
      '<script src="https://DIN-VERCEL-URL/chat.js"><\/script>';

    document.getElementById("installCode").innerText = installScript;

    document.getElementById("result").classList.remove("hidden");
  } else {
    alert(data.error);
  }
}

function copyKey() {
  navigator.clipboard.writeText(currentKey);
  alert("API-nyckel kopierad 🚀");
}

function copyInstall() {
  const code = document.getElementById("installCode").innerText;
  navigator.clipboard.writeText(code);
  alert("Installationskod kopierad 🚀");
}
</script>
